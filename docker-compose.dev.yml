services:
  db:
    image: mysql:8.0
    container_name: cais_db_dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cais
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    ports:
      - '3307:3306'
    volumes:
      - db_data_dev:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'user', '-puser']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  db_data_dev:
