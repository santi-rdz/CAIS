services:
  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend
    restart: always
    working_dir: /app
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter frontend run dev"
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5173']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  backend:
    build: ./backend
    ports:
      - '8000:8000'
    restart: always
    working_dir: /app
    environment:
      DATABASE_URL: 'mysql://user:user@db:3306/cais'
      FRONTEND_URL: 'http://localhost:5173'
    volumes:
      - .:/app
      - root_node_modules_backend:/app/node_modules
      - backend_node_modules:/app/backend/node_modules
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter backend run prisma:generate && pnpm --filter backend run start"
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cais
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    ports:
      - '3307:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'user', '-puser']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  db_data:
  root_node_modules:
  frontend_node_modules:
  root_node_modules_backend:
  backend_node_modules:
